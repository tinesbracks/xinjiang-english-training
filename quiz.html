<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选择题检验 - 新疆中考英语读写题核心训练</title>
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← 返回主页</a>
        
        <h2>✍️ 选择题检验</h2>
        
        <div class="filter-container" style="justify-content: center; margin-bottom: 20px;">
            <button class="btn btn-primary" id="tab-all" onclick="switchTab('all')" style="margin-right: 10px;">📋 全部检验</button>
            <button class="btn btn-warning" id="tab-unmastered" onclick="switchTab('unmastered')">⚠️ 未掌握检验</button>
        </div>
        
        <div class="progress-bar">
            <div id="progress-fill" class="progress-fill" style="width: 0%;">0%</div>
        </div>
        <div id="progress-text" style="text-align: center; margin-bottom: 20px;">题目: 0/0 | 正确: 0 | 正确率: 0%</div>
        
        <div class="quiz-container" id="quiz-container">
            <!-- 题目将在这里动态加载 -->
            <div style="text-align: center; padding: 50px; color: #999;">
                加载中...
            </div>
        </div>
        
        <div style="display: flex; justify-content: center; gap: 20px; margin-top: 30px;">
            <button class="btn btn-primary" onclick="prevQuestion()">← 上一题</button>
            <button class="btn btn-success" onclick="restartQuiz()">重新开始</button>
            <button class="btn btn-primary" onclick="nextQuestion()">下一题 →</button>
        </div>
        
        <div id="result-container" style="display: none; margin-top: 40px; padding: 30px; background: #f8f9fa; border-radius: 15px; text-align: center;">
            <h2>🎉 测验完成！</h2>
            <p style="font-size: 1.5em; margin: 20px 0;">
                正确率: <strong id="final-score">0%</strong>
            </p>
            <button class="btn btn-primary" onclick="restartQuiz()" style="padding: 15px 40px; font-size: 18px;">
                再测一次
            </button>
        </div>
    </div>
    
    <script src="app.js"></script>
    <script>
        let vocabularyData = [];
        let quizQuestions = [];
        let currentQuestionIndex = 0;
        let correctCount = 0;
        let answeredCount = 0;
        let currentTab = 'all'; // 'all' 或 'unmastered'
        
        // 切换标签
        function switchTab(tab) {
            currentTab = tab;
            
            // 更新按钮样式
            document.getElementById('tab-all').className = 'btn btn-primary';
            document.getElementById('tab-unmastered').className = 'btn btn-warning';
            
            if (tab === 'all') {
                document.getElementById('tab-all').className = 'btn btn-primary';
                document.getElementById('tab-unmastered').className = 'btn btn-secondary';
            } else {
                document.getElementById('tab-all').className = 'btn btn-secondary';
                document.getElementById('tab-unmastered').className = 'btn btn-warning';
            }
            
            // 重新加载题目
            restartQuiz();
        }
        
        // 加载数据
        async function init() {
            vocabularyData = await loadVocabularyData();
            
            // 设置初始标签样式
            document.getElementById('tab-all').className = 'btn btn-primary';
            document.getElementById('tab-unmastered').className = 'btn btn-secondary';
            currentTab = 'all';
            
            // 根据当前标签筛选数据
            loadQuizData();
        }
        
        // 根据当前标签加载测验数据
        function loadQuizData() {
            // 过滤出有例句的数据
            let validData = vocabularyData.filter(item => 
                item.example && 
                item.example.original_sentence && 
                item.example.target_sentence && 
                item.example.answer &&
                item.example.answer !== '[待完善]'
            );
            
            // 如果选择"未掌握检验"，只加载未掌握的词汇
            if (currentTab === 'unmastered') {
                validData = validData.filter(item => !item.mastered);
            }
            
            if (validData.length === 0) {
                const message = currentTab === 'unmastered' 
                    ? '太棒了！所有词汇都已掌握，没有未掌握的词汇可以测验！' 
                    : '暂无完整例句数据，请先完善数据后再进行测验！';
                alert(message);
                return;
            }
            
            // 生成测验题目
            generateQuizQuestions(validData);
            
            // 显示第一题
            showQuestion();
            updateProgress();
        }
        
        // 生成测验题目
        function generateQuizQuestions(validData) {
            quizQuestions = validData.map(item => {
                const correctAnswer = item.example.answer;
                const options = generateOptions(correctAnswer, validData, item.id);
                
                return {
                    original_sentence: item.example.original_sentence,
                    target_sentence: item.example.target_sentence,
                    options: options,
                    correct_answer: correctAnswer,
                    id: item.id
                };
            });
            
            // 随机排序题目
            quizQuestions.sort(() => Math.random() - 0.5);
        }
        
        // 显示题目
        function showQuestion() {
            if (currentQuestionIndex >= quizQuestions.length) {
                showResult();
                return;
            }
            
            const question = quizQuestions[currentQuestionIndex];
            
            const container = document.getElementById('quiz-container');
            container.innerHTML = `
                <div class="quiz-question">
                    <div style="color: #666; margin-bottom: 15px;">题目 ${currentQuestionIndex + 1}/${quizQuestions.length}</div>
                    <div class="quiz-sentence">
                        <strong>原文：</strong>${question.original_sentence}
                    </div>
                    <div class="quiz-sentence" style="margin-top: 20px;">
                        <strong>题目：</strong>${question.target_sentence.replace('______', '<span style="display: inline-block; width: 120px; height: 25px; border-bottom: 2px solid #667eea; margin: 0 5px;"></span>')}
                    </div>
                </div>
                
                <div style="margin: 30px 0; font-size: 1.1em; font-weight: bold; color: #667eea;">
                    请选择正确的答案：
                </div>
                
                <div class="quiz-options" id="quiz-options">
                    ${question.options.map((option, index) => `
                        <div class="quiz-option" onclick="selectOption(${index}, '${option}')" id="option-${index}">
                            ${String.fromCharCode(65 + index)}. ${option}
                        </div>
                    `).join('')}
                </div>
                
                <div id="explanation" style="display: none; margin-top: 30px; padding: 20px; background: #e7f3ff; border-radius: 10px; border-left: 4px solid #667eea;">
                    <!-- 解释将在这里显示 -->
                </div>
                
                <div style="text-align: center; margin-top: 30px;">
                    <button class="btn btn-primary" onclick="nextQuestion()" id="next-btn" style="display: none;">
                        下一题 →
                    </button>
                </div>
            `;
        }
        
        // 选择选项
        function selectOption(index, selectedAnswer) {
            const question = quizQuestions[currentQuestionIndex];
            const options = document.querySelectorAll('.quiz-option');
            
            // 禁用所有选项
            options.forEach(option => {
                option.style.pointerEvents = 'none';
            });
            
            // 显示正确答案和错误答案
            options.forEach((option, i) => {
                const optionText = option.textContent.substring(3); // 去掉 "A. " 前缀
                if (optionText === question.correct_answer) {
                    option.classList.add('correct');
                } else if (i === index && optionText !== question.correct_answer) {
                    option.classList.add('wrong');
                }
            });
            
            // 更新计数
            answeredCount++;
            if (selectedAnswer === question.correct_answer) {
                correctCount++;
            }
            
            // 显示解释
            const explanation = document.getElementById('explanation');
            explanation.style.display = 'block';
            explanation.innerHTML = `
                <div style="font-weight: bold; margin-bottom: 10px;">📖 解析：</div>
                <div>原文：${question.original_sentence}</div>
                <div style="margin-top: 10px;">题目：${question.target_sentence.replace('______', `<strong style="color: #667eea;">${question.correct_answer}</strong>`)}</div>
                <div style="margin-top: 10px; color: ${selectedAnswer === question.correct_answer ? '#28a745' : '#dc3545'}; font-weight: bold;">
                    ${selectedAnswer === question.correct_answer ? '✓ 回答正确！' : '✗ 回答错误。正确答案是：' + question.correct_answer}
                </div>
            `;
            
            // 显示下一题按钮
            document.getElementById('next-btn').style.display = 'inline-block';
            
            // 更新进度
            updateProgress();
        }
        
        // 上一题
        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                showQuestion();
                updateProgress();
            }
        }
        
        // 下一题
        function nextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex >= quizQuestions.length) {
                showResult();
            } else {
                showQuestion();
                updateProgress();
            }
        }
        
        // 显示结果
        function showResult() {
            document.getElementById('quiz-container').style.display = 'none';
            document.querySelector('.progress-bar').style.display = 'none';
            document.getElementById('progress-text').style.display = 'none';
            document.querySelector('div[style*="justify-content: center; gap: 20px; margin-top: 30px;"]').style.display = 'none';
            
            const resultContainer = document.getElementById('result-container');
            resultContainer.style.display = 'block';
            
            const score = answeredCount > 0 ? Math.round((correctCount / answeredCount) * 100) : 0;
            document.getElementById('final-score').textContent = score + '%';
            document.getElementById('final-score').style.color = score >= 60 ? '#28a745' : '#dc3545';
        }
        
        // 重新开始
        function restartQuiz() {
            currentQuestionIndex = 0;
            correctCount = 0;
            answeredCount = 0;
            
            document.getElementById('quiz-container').style.display = 'block';
            document.querySelector('.progress-bar').style.display = 'block';
            document.getElementById('progress-text').style.display = 'block';
            document.querySelector('div[style*="justify-content: center; gap: 20px; margin-top: 30px;"]').style.display = 'flex';
            document.getElementById('result-container').style.display = 'none';
            
            // 重新加载数据（根据当前标签）
            loadQuizData();
        }
        
        // 更新进度
        function updateProgress() {
            const total = quizQuestions.length;
            const percentage = total > 0 ? Math.round((currentQuestionIndex / total) * 100) : 0;
            
            document.getElementById('progress-fill').style.width = percentage + '%';
            document.getElementById('progress-fill').textContent = percentage + '%';
            
            const accuracy = answeredCount > 0 ? Math.round((correctCount / answeredCount) * 100) : 0;
            document.getElementById('progress-text').innerHTML = 
                `题目: ${Math.min(currentQuestionIndex + 1, total)}/${total} | 正确: ${correctCount} | 正确率: ${accuracy}%`;
        }
        
        // 页面加载时初始化
        init();
    </script>
</body>
</html>
