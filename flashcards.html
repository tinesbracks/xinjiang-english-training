<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>卡片记忆 - 新疆中考英语读写题核心训练</title>
    <link rel="stylesheet" href="style.css">
    <script src="auth.js"></script>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← 返回主页</a>
        
        <h2>🃏 卡片记忆</h2>
        
        <div class="progress-bar">
            <div id="progress-fill" class="progress-fill" style="width: 0%;">0%</div>
        </div>
        <div id="progress-text" style="text-align: center; margin-bottom: 20px;">进度: 0/0 (0%)</div>
        
        <div class="filter-container">
            <button class="btn btn-primary" onclick="loadAll()">全部词汇</button>
            <button class="btn btn-success" onclick="loadUnmastered()">只练习未掌握</button>
            <span style="margin-left: 20px;">当前: <strong id="current-index">0</strong> / <strong id="total-cards">0</strong></span>
        </div>
        
        <div class="flashcard" id="flashcard" onclick="flipCard()">
            <div class="flashcard-inner">
                <div class="flashcard-front">
                    <div style="font-size: 1.2em; margin-bottom: 20px; opacity: 0.8;">点击卡片翻转</div>
                    <div style="margin-bottom: 30px;">
                        <div style="font-size: 0.9em; opacity: 0.7; margin-bottom: 10px;">原文表达</div>
                        <div class="flashcard-word" id="card-front-original" style="margin-bottom: 20px;">加载中...</div>
                        <div style="font-size: 0.9em; opacity: 0.7; margin-bottom: 10px;">题目表达</div>
                        <div class="flashcard-word" id="card-front-target" style="color: #000; font-weight: bold; font-size: 1.8em;">加载中...</div>
                    </div>
                </div>
                <div class="flashcard-back">
                    <div style="font-size: 1.2em; margin-bottom: 20px; color: #667eea;">中文释义</div>
                    <div class="flashcard-meaning" id="card-back-meaning" style="font-size: 2em;"></div>
                    <div style="margin-top: 40px; font-size: 1em; opacity: 0.7;">例句</div>
                    <div style="margin-top: 15px; font-size: 1.1em; line-height: 1.6;" id="card-back-example"></div>
                </div>
            </div>
        </div>
        
        <div style="display: flex; justify-content: center; gap: 20px; margin-top: 30px;">
            <button class="btn btn-danger" onclick="markUnmastered()">❌ 不认识</button>
            <button class="btn btn-primary" onclick="prevCard()">← 上一个</button>
            <button class="btn btn-primary" onclick="nextCard()">下一个 →</button>
            <button class="btn btn-success" onclick="markMastered()">✓ 已认识</button>
        </div>
        
        <div style="margin-top: 30px; text-align: center;">
            <button class="btn btn-primary" onclick="saveAndGoToQuiz()" style="padding: 15px 40px; font-size: 18px;">
                去做选择题检验 →
            </button>
        </div>
    </div>
    
    <script src="app.js"></script>
    <script>
        let vocabularyData = [];
        let currentCards = [];
        let currentIndex = 0;
        let isFlipped = false;
        
        // 加载数据
        async function init() {
            vocabularyData = await loadVocabularyData();
            
            // 尝试从 localStorage 加载进度
            const progress = loadProgress();
            if (progress) {
                vocabularyData = mergeDataWithProgress(vocabularyData, progress);
            }
            
            // 默认加载全部
            loadAll();
        }
        
        // 加载全部
        function loadAll() {
            currentCards = vocabularyData;
            currentIndex = 0;
            isFlipped = false;
            updateCard();
            updateProgress();
        }
        
        // 只加载未掌握
        function loadUnmastered() {
            currentCards = getUnmasteredItems(vocabularyData);
            if (currentCards.length === 0) {
                alert('太棒了！所有词汇都已掌握！');
                return;
            }
            currentIndex = 0;
            isFlipped = false;
            updateCard();
            updateProgress();
        }
        
        // 更新卡片
        function updateCard() {
            if (currentCards.length === 0) {
                document.getElementById('card-front-original').textContent = '暂无数据';
                document.getElementById('card-front-target').textContent = '';
                document.getElementById('card-back-meaning').textContent = '';
                document.getElementById('card-back-example').textContent = '';
                return;
            }
            
            const item = currentCards[currentIndex];
            
            // 正面：原文表达 + 题目表达（两个同义词）
            document.getElementById('card-front-original').textContent = item.original;
            document.getElementById('card-front-target').textContent = item.target;
            
            // 背面：中文释义
            document.getElementById('card-back-meaning').textContent = item.meaning;
            
            // 显示例句（如果有）
            if (item.example && item.example.original_sentence) {
                document.getElementById('card-back-example').innerHTML = 
                    `<div style="margin-bottom: 10px;">原文: ${item.example.original_sentence}</div>` +
                    `<div>题目: ${item.example.target_sentence}</div>`;
            } else {
                document.getElementById('card-back-example').textContent = '例句待完善';
            }
            
            // 更新索引显示
            document.getElementById('current-index').textContent = currentIndex + 1;
            document.getElementById('total-cards').textContent = currentCards.length;
            
            // 重置翻转状态
            const flashcard = document.getElementById('flashcard');
            flashcard.classList.remove('flipped');
            isFlipped = false;
        }
        
        // 翻转卡片
        function flipCard() {
            const flashcard = document.getElementById('flashcard');
            flashcard.classList.toggle('flipped');
            isFlipped = !isFlipped;
        }
        
        // 上一个
        function prevCard() {
            if (currentCards.length === 0) return;
            
            currentIndex = (currentIndex - 1 + currentCards.length) % currentCards.length;
            isFlipped = false;
            updateCard();
        }
        
        // 下一个
        function nextCard() {
            if (currentCards.length === 0) return;
            
            currentIndex = (currentIndex + 1) % currentCards.length;
            isFlipped = false;
            updateCard();
        }
        
        // 标记为已掌握
        function markMastered() {
            if (currentCards.length === 0) return;
            
            const item = currentCards[currentIndex];
            const originalItem = vocabularyData.find(d => d.id === item.id);
            if (originalItem) {
                originalItem.mastered = true;
                saveProgress(vocabularyData);
                showNotification('已标记为掌握 ✓');
                updateProgress();
                
                // 如果当前是"只练习未掌握"模式，移除当前卡片
                if (currentCards === getUnmasteredItems(vocabularyData)) {
                    currentCards = getUnmasteredItems(vocabularyData);
                    if (currentCards.length === 0) {
                        alert('太棒了！所有词汇都已掌握！');
                        return;
                    }
                    if (currentIndex >= currentCards.length) {
                        currentIndex = 0;
                    }
                }
                
                updateCard();
            }
        }
        
        // 标记为未掌握
        function markUnmastered() {
            if (currentCards.length === 0) return;
            
            const item = currentCards[currentIndex];
            const originalItem = vocabularyData.find(d => d.id === item.id);
            if (originalItem) {
                originalItem.mastered = false;
                saveProgress(vocabularyData);
                showNotification('已标记为未掌握');
                updateProgress();
                nextCard();
            }
        }
        
        // 更新进度
        function updateProgress() {
            const progress = calculateProgress(vocabularyData);
            updateProgressBar(progress.total, progress.mastered);
        }
        
        // 保存并跳转到选择题页面
        function saveAndGoToQuiz() {
            saveProgress(vocabularyData);
            window.location.href = 'quiz.html';
        }
        
        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                e.preventDefault();
                flipCard();
            } else if (e.key === 'ArrowLeft') {
                prevCard();
            } else if (e.key === 'ArrowRight') {
                nextCard();
            } else if (e.key === '1') {
                markUnmastered();
            } else if (e.key === '2') {
                markMastered();
            }
        });
        
        // 页面加载时初始化
        init();
    </script>
</body>
</html>
